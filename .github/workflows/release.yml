name: Self-signed Release

# Builds the official auto-update release in CI, signed with the self-signed
# "zap" certificate and verified by Sparkle EdDSA signatures. This release path
# is not Developer ID signed or notarized, so brand-new installs may still show a
# first-launch Gatekeeper warning.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish self-signed release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="$INPUT_TAG"
          APP_VERSION="$(make -s print-app-version)"
          BUILD_NUMBER="$(make -s print-build-number)"
          BUILD_TAG="$(make -s print-build-tag)"
          VERSION="${TAG#v}"
          DMG_PATH="dist/Zap-${VERSION}.dmg"
          APPCAST_PATH="dist/appcast.xml"

          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use semantic versioning, for example v0.1.0." >&2
            exit 1
          fi

          if [ "$TAG" != "$BUILD_TAG" ]; then
            echo "Workflow tag $TAG must match BUILD_TAG $BUILD_TAG from Makefile." >&2
            exit 1
          fi

          if [ "$VERSION" != "$APP_VERSION" ]; then
            echo "Workflow version $VERSION must match APP_VERSION $APP_VERSION from Makefile." >&2
            exit 1
          fi

          if ! [[ "$BUILD_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo "Build number must be a positive integer." >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Release tag $TAG already exists on origin. Choose a new release tag." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "appcast_path=$APPCAST_PATH" >> "$GITHUB_OUTPUT"

      - name: Test
        run: swift test

      # Required GitHub secrets:
      #   ZAP_CERTIFICATE_BASE64 — base64-encoded .p12 of the self-signed "zap" certificate, including its private key
      #   ZAP_CERTIFICATE_PASSWORD — password for the .p12
      #   SPARKLE_PRIVATE_KEY — Sparkle EdDSA private key for appcast signing
      - name: Import Zap signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.ZAP_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.ZAP_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/zap_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 20)"

          if [ -z "$CERTIFICATE_BASE64" ]; then
            echo "ZAP_CERTIFICATE_BASE64 secret is required." >&2
            exit 1
          fi

          if [ -z "$CERTIFICATE_PASSWORD" ]; then
            echo "ZAP_CERTIFICATE_PASSWORD secret is required." >&2
            exit 1
          fi

          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm -f "$CERTIFICATE_PATH"

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"

          # The zap certificate is self-signed, so without trust settings it may
          # not appear in `find-identity -v` in this throwaway keychain. codesign
          # can still sign by common name, so pin the identity.
          echo "Codesigning identities present in keychain:"
          security find-identity -p codesigning "$KEYCHAIN_PATH" || true
          echo "CODESIGN_IDENTITY=zap" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build and verify self-signed DMG
        run: make CODESIGN_IDENTITY="$CODESIGN_IDENTITY" VERSION="${{ steps.version.outputs.version }}" BUILD_NUMBER="${{ steps.version.outputs.build_number }}" BUILD_TAG="${{ steps.version.outputs.tag }}" verify-dmg

      - name: Sign DMG
        run: make CODESIGN_IDENTITY="$CODESIGN_IDENTITY" VERSION="${{ steps.version.outputs.version }}" BUILD_NUMBER="${{ steps.version.outputs.build_number }}" BUILD_TAG="${{ steps.version.outputs.tag }}" sign-dmg

      - name: Generate Sparkle appcast
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          DMG_PATH: ${{ steps.version.outputs.dmg_path }}
          APPCAST_PATH: ${{ steps.version.outputs.appcast_path }}
          REPOSITORY: ${{ github.repository }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: scripts/generate-sparkle-appcast.sh

      - name: Create tag
        run: |
          git tag "${{ steps.version.outputs.tag }}" "$GITHUB_SHA"
          git push origin "refs/tags/${{ steps.version.outputs.tag }}"

      - name: Create Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Zap ${{ steps.version.outputs.version }}
          body: |
            Self-signed, non-notarized DMG with Sparkle appcast.

            macOS may show a first-launch security warning because this build is signed with Zap's own certificate rather than notarized. If that happens, open System Settings > Privacy & Security and choose Open Anyway.
          generate_release_notes: true
          make_latest: true
          files: |
            ${{ steps.version.outputs.dmg_path }}
            ${{ steps.version.outputs.appcast_path }}

      - name: Cleanup signing artifacts
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/zap_certificate.p12"
          KPATH="${KEYCHAIN_PATH:-$RUNNER_TEMP/signing.keychain-db}"
          if [ -f "$KPATH" ]; then
            security delete-keychain "$KPATH"
          fi
